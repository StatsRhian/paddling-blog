name: Publish

on:
  push:
    branches: [main, feature/publish-via-gha]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: astral-sh/setup-uv@v3

      - name: Generate paddle traces
        run: uv run generate_paddle_traces.py

      - name: Set up R
        uses: r-lib/actions/setup-r@v2

      - name: Cache R packages
        uses: actions/cache@v4
        with:
          path: /home/runner/work/_temp/Library
          key: ${{ runner.os }}-r-${{ hashFiles('**/DESCRIPTION') }}
          restore-keys: ${{ runner.os }}-r-

      - name: Install system dependencies for sf
        run: |
          sudo apt-get update
          sudo apt-get install -y libgdal-dev libproj-dev libgeos-dev libudunits2-dev

      - name: Install R packages
        run: |
          Rscript -e 'install.packages(c("dplyr","stringr","purrr","glue","readr","sf","lubridate","cli","jinjar","knitr","rmarkdown","reactable","htmltools","leaflet","leaflet.extras","htmlwidgets","tidyverse","scales","ggtext","bslib","bsicons"))'

      - name: Generate posts
        run: Rscript update.R

      - name: Render site with Quarto
        uses: quarto-dev/quarto-actions/setup@v2
      - run: quarto render

      - name: Commit generated files
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: ":card_file_box: Update geojson and posts [skip ci]"
          file_pattern: "data/paddle_traces.geojson data/processed_paddles.rds"

      - name: Deploy to Netlify
        uses: nwtgck/actions-netlify@v2.1
        with:
          publish-dir: "./_site"
          production-branch: main
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: "Deploy from GitHub Actions"
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: 0b365f34-7e97-4b5d-9cef-807b6dfd7a86
