description: |
  1:1 with Paul, warmed up at the top, practicing sweeps, edge and turning. Did one run, focusing on driving over the eddy line rather than turning on it. One swim when I went straight into a rock, a little tricky to get my feet out. Good play on the islands wave and a drive home. Halton on a  low (0.6m).
