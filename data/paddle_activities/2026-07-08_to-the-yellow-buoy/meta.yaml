title: "To the yellow buoy"
club: "peer"
venue: "tynemouth"
tags: []
description: |
  Kirstie and I paddled out to the yellow mine buoy and back, my second visit. It's good practice for those long crossings, and it's always interesting being a little way offshore. When we first rounded the pier, we couldn't even see the buoy.
  
  As we reached the deeper water there were plenty more anglers (and, presumably, plenty more fish). A hydrofoil came over to say hello, which was a fun surprise. The wind was a bit stronger than forecast, and the sea had a constant pattern of small, choppy waves, making for a good workout all the way back.
