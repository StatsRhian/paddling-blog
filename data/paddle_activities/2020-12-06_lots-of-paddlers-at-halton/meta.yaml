id: "2020-12-06_lots-of-paddlers-at-halton"
date: "2020-12-06"
title: "Lots of paddlers at Halton"
club: "lancaster"
tags:
  - "halton-rapids"
description: |
  The level was huge (1.3m) on Saturday so we decided to paddle on Sunday instead (medium 0.8m). I went straight to the top with Richard, Colin, Ian and Alec. It was a busy day, with paddlers from LU, slalom paddlers and some open boats. We did 2 full runs and I did a third have run with Alis and Colin. We just did one long session before lunch. A good level for ferry gliding and breaking in. I pushed through some lumpy bits and stayed up-right. Was feeling a little tired today and missed a couple of my intended eddies. Nice to get out dry!
